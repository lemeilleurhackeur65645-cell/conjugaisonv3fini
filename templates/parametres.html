<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paramètres</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<button id="settings-gear" class="settings-gear" aria-expanded="false" aria-controls="settings-popup" aria-label="Paramètres">
  <svg viewBox="0 0 24 24" width="36" height="36" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" role="img">
    <path
      d="M12 2.5
         L13.2 2.5
         L13.7 5
         A7 7 0 0 1 16 6
         L18 4.5
         L19.5 6
         L18 8
         A7 7 0 0 1 19 10.3
         L21.5 10.8
         L21.5 13.2
         L19 13.7
         A7 7 0 0 1 18 16
         L19.5 18
         L18 19.5
         L16 18
         A7 7 0 0 1 13.7 19
         L13.2 21.5
         L10.8 21.5
         L10.3 19
         A7 7 0 0 1 8 18
         L6 19.5
         L4.5 18
         L6 16
         A7 7 0 0 1 5 13.7
         L2.5 13.2
         L2.5 10.8
         L5 10.3
         A7 7 0 0 1 6 8
         L4.5 6
         L6 4.5
         L8 6
         A7 7 0 0 1 10.3 5
         L10.8 2.5
         Z"
      fill="none"
      stroke="white"
      stroke-width="1.5"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <circle cx="12" cy="12" r="3" fill="none" stroke="white" stroke-width="1.5" />
  </svg>
</button>

<div id="settings-popup" class="settings-popup" role="dialog" aria-hidden="true" aria-labelledby="settings-title">
  <div class="settings-popup-inner">
    <h2 id="settings-title">Paramètres</h2>
    <div class="setting-block">
      <label class="setting-label">Interface</label>
      <div class="switch-container interface-switch" role="group" aria-label="Interface mobile ou PC">
        <span class="switch-label">Mobile</span>
        <label class="switch" aria-hidden="true">
          <input type="checkbox" id="interface-toggle" aria-checked="true" />
          <span class="slider" aria-hidden="true"></span>
        </label>
        <span class="switch-label">PC</span>
      </div>
      <p class="muted small-note">Active Mobile pour adapter l'interface à ton téléphone.</p>
    </div>
    <div class="setting-block">
      <p class="muted">Cliquez de nouveau sur l'engrenage pour fermer.</p>
    </div>
  </div>
</div>

<div class="container">
    <h1>Paramètres</h1>

    <div class="setting-block">
        <label class="setting-label">Interface</label>
        <div class="switch-container interface-switch">
            <span class="switch-label">Mobile</span>
            <label class="switch">
                <input type="checkbox" id="interface-toggle-main">
                <span class="slider"></span>
            </label>
            <span class="switch-label">PC</span>
        </div>
        <p class="muted small-note">Active Mobile pour adapter l'interface à ton téléphone.</p>
    </div>

    <div style="margin-top: 30px;">
        <a href="/" class="back-button">← Retour à l'accueil</a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/settings.js') }}" defer></script>
</body>
</html>
